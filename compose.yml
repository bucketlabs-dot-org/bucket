version: "3.9"

services:
  db:
    image: postgres:16
    container_name: bucket-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bucket
      POSTGRES_PASSWORD: bktpwd123
      POSTGRES_DB: bucket
    ports:
      - "5432:5432"
    volumes:
      - bucket-db-data:/var/lib/postgresql/data
      - ./init.sql:/init.sql

  api:
    build:
      context: .
      dockerfile: containerfile.api
    container_name: bucket-api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_DSN: ${DB_DSN}
      B2_BUCKET: ${B2_BUCKET}
      B2_ENDPOINT: ${B2_ENDPOINT}
      B2_ACCESS_KEY: ${B2_ACCESS_KEY}
      B2_SECRET_KEY: ${B2_SECRET_KEY}
      BASE_URL: http://localhost:8080
    ports:
      - "8080:8080"

volumes:
  bucket-db-data:
